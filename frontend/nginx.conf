server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Gzip
  gzip on;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
  gzip_min_length 256;

  # Health for Docker / Compose
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # API proxy — forwards /api/* to the FastAPI service. `^~` tells nginx
  # that matching this prefix wins over the regex locations below (needed
  # so requests for e.g. /api/v1/monitoring/evaluation/figures/*.png are
  # proxied instead of being swallowed by the static-asset regex).
  location ^~ /api/ {
    proxy_pass http://api:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Retrain trains five models synchronously — bump the idle read timeout
    # so the response isn't prematurely terminated as a 504. SSE log stream
    # needs buffering disabled so events reach the browser as they happen.
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_buffering off;
    proxy_cache off;
    client_max_body_size 12m;
  }

  # MLflow UI proxy (optional, for staff access)
  location /mlflow/ {
    proxy_pass http://mlflow:5000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Long-cache hashed assets
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — any unknown route returns index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
